name: Bug Report
description: Report a bug
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting! Please fill out the form below to help us reproduce the issue.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How to reproduce this issue
      placeholder: |
        1. Run '...'
        2. Click '...'
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened
  - type: input
    id: windows-version
    attributes:
      label: Windows Version
      description: e.g. Windows 10 22H2
  - type: input
    id: enikk-version
    attributes:
      label: Enikk Version
      description: e.g. v0.1.0 or commit hash
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Relevant log output
      render: shell
  - type: textarea
    id: additional
    attributes:
      label: Additional Information
      description: Screenshots or other context
