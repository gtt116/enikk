name: Build

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      pull-requests: write

    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v3
      with:
        version: "latest"

    - name: Set up Python 3.12
      run: uv python install 3.12

    - name: Create virtual environment
      run: uv venv

    - name: Install dependencies
      run: uv pip install -e "."

    - name: Install PyInstaller
      run: uv pip install pyinstaller

    - name: Build release
      run: .\build.bat --release

    - name: Determine version
      id: version
      run: |
        if ("${{ github.ref_type }}" -eq "tag") {
          $version = "${{ github.ref_name }}"
        } else {
          $short = "${{ github.sha }}".Substring(0,7)
          $version = "dev-$short"
        }
        "version=$version" >> $env:GITHUB_OUTPUT
        Write-Host "Version: $version"

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: enikk-${{ steps.version.outputs.version }}
        path: dist/enikk/

    - name: Comment artifact link on PR
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        script: |
          const version = '${{ steps.version.outputs.version }}';
          const owner = context.repo.owner;
          const repo = context.repo.repo;
          const runId = context.runId;

          // Get artifact ID
          const artifacts = await github.rest.actions.listWorkflowRunArtifacts({
            owner,
            repo,
            run_id: runId
          });
          const artifactName = `enikk-${version}`;
          const artifact = artifacts.data.artifacts.find(a => a.name === artifactName);

          let downloadUrl;
          let body;
          if (artifact) {
            downloadUrl = `https://github.com/${owner}/${repo}/actions/runs/${runId}/artifacts/${artifact.id}`;
            body = `✅ Build succeeded! Artifact: \`${artifactName}\`\n\n📥 [Download artifact](${downloadUrl})`;
          } else {
            const runUrl = `https://github.com/${owner}/${repo}/actions/runs/${runId}`;
            body = `✅ Build succeeded! Artifact: \`${artifactName}\`\n\n📥 [View Actions run](${runUrl})`;
          }

          // Find existing comment or create new one
          const comments = await github.rest.issues.listComments({
            owner,
            repo,
            issue_number: context.issue.number
          });
          const marker = '<!-- build-artifact -->';
          const existing = comments.data.find(c => c.body.includes(marker));

          const message = `${marker}\n${body}`;

          if (existing) {
            await github.rest.issues.updateComment({
              owner,
              repo,
              comment_id: existing.id,
              body: message
            });
          } else {
            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: context.issue.number,
              body: message
            });
          }

    - name: Create zip for release
      if: startsWith(github.ref, 'refs/tags/')
      run: |
        $version = "${{ steps.version.outputs.version }}"
        powershell -Command "Compress-Archive -Path 'dist/enikk' -DestinationPath 'dist/enikk-$version.zip' -Force"

    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: dist/enikk-${{ steps.version.outputs.version }}.zip
        generate_release_notes: true
