# Enikk configuration

# Application definitions (for game-specific automation)
apps:
  nikke:
    app_path: "C:\\Games\\NIKKE\\game\\nikke.exe"
    launcher_path: "C:\\Games\\NIKKE\\Launcher\\nikke_launcher.exe"
    launch_timeout: 120
  # Add more apps as needed:
  # wutheringwaves:
  #   app_path: "C:\\Games\\WutheringWaves\\Client.exe"
  #   launcher_path: "C:\\Games\\WutheringWaves\\launcher.exe"

# HTTP server settings
server:
  host: "127.0.0.1"
  port: 18931

# LLM model configuration
model:
  default: "qwen3.6-plus"
  provider: "alibaba"
  base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
  api_key: "sk-your-api-key-here"
  max_tokens: 65536

# Workspace directories
workspace:
  screenshot_dir: "./screenshots"
  weights_dir: "./weights"
  save_screenshots: false

# IM platform integration (DingTalk, QQBot)
# Requires hermes-agent with the corresponding platform SDK installed.
# Uncomment and configure the platforms you want to use.
im:
  platforms:
    dingtalk:
      enabled: false
      token: ""  # Get webhook token from DingTalk admin

    qqbot:
      enabled: false
      extra:
        app_id: ""  # Your QQ Bot App ID
        client_secret: ""  # Your QQ Bot client secret
        markdown_support: true
